<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Crear cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            background: white;
        }
        /* Estiliza los campos que genera Django automáticamente */
        form p label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        form p input {
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Crear cuenta</h2>
        <p class="text-muted">Únete a nuestra comunidad</p>
    </div>

    <form method="post">
        {% csrf_token %}

        {# Renderiza el formulario de Django #}
        {{ form.as_p }}

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Registrarse</button>
        </div>
    </form>

    <hr class="my-4">

    <div class="text-center">
        <p class="mb-0">¿Ya tienes cuenta?</p>
        <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Inicia sesión</a>
    </div>

    <p class="mt-4 text-center text-muted small">&copy; 2026</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
